<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Gesture Particle Morph</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: sans-serif;
        }

        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            pointer-events: none;
            z-index: 10;
        }

        canvas {
            display: block;
        }

        video {
            display: none;
        }
    </style>
</head>

<body>
    <div id="info">Move your hand to control particles. <br> Pinch to change color.</div>
    <video id="video" playsinline></video>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        let scene, camera, renderer, particles, geometry;
        const PARTICLE_COUNT = 5000;
        let targetPositions = new Float32Array(PARTICLE_COUNT * 3);
        let currentPositions = new Float32Array(PARTICLE_COUNT * 3);
        let colors = new Float32Array(PARTICLE_COUNT * 3);

        const videoElement = document.getElementById('video');

        // --- 1. SHAPE GENERATORS ---
        function setSphere() {
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const phi = Math.acos(-1 + (2 * i) / PARTICLE_COUNT);
                const theta = Math.sqrt(PARTICLE_COUNT * Math.PI) * phi;
                targetPositions[i * 3] = Math.cos(theta) * Math.sin(phi) * 5;
                targetPositions[i * 3 + 1] = Math.sin(theta) * Math.sin(phi) * 5;
                targetPositions[i * 3 + 2] = Math.cos(phi) * 5;
            }
        }

        function setHeart() {
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const t = Math.random() * Math.PI * 2;
                // Heart Curve Equations
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
                targetPositions[i * 3] = x * 0.3;
                targetPositions[i * 3 + 1] = y * 0.3;
                targetPositions[i * 3 + 2] = (Math.random() - 0.5) * 2;
            }
        }

        function setSaturn() {
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                if (i < PARTICLE_COUNT * 0.4) { // The Planet
                    const phi = Math.random() * Math.PI * 2;
                    const theta = Math.random() * Math.PI;
                    targetPositions[i * 3] = 3 * Math.cos(phi) * Math.sin(theta);
                    targetPositions[i * 3 + 1] = 3 * Math.sin(phi) * Math.sin(theta);
                    targetPositions[i * 3 + 2] = 3 * Math.cos(theta);
                } else { // The Ring
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 4.5 + Math.random() * 2.5;
                    targetPositions[i * 3] = Math.cos(angle) * dist;
                    targetPositions[i * 3 + 1] = Math.sin(angle) * dist * 0.2; // Flattened ring
                    targetPositions[i * 3 + 2] = Math.sin(angle) * dist;
                }
            }
        }

        // --- 2. THREE.JS SETUP ---
        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            geometry = new THREE.BufferGeometry();
            setSphere(); // Default shape

            geometry.setAttribute('position', new THREE.BufferAttribute(currentPositions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.08,
                vertexColors: true,
                transparent: true,
                blending: THREE.AdditiveBlending
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            // Initial Colors
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                colors[i * 3] = Math.random();
                colors[i * 3 + 1] = 0.5;
                colors[i * 3 + 2] = 1.0;
            }
        }

        // --- 3. MEDIAPIPE HAND TRACKING ---
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        let handX = 0, handY = 0, handZ = 0;

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmark = results.multiHandLandmarks[0][8]; // Index Finger Tip
                handX = (landmark.x - 0.5) * -30;
                handY = (landmark.y - 0.5) * -20;
                handZ = landmark.z; // Tracking depth

                // Gesture: Change shape based on hand depth/position
                if (landmark.y < 0.2) setHeart();
                else if (landmark.x < 0.3) setSaturn();
                else if (landmark.x > 0.7) setSphere();
            }
        });

        const cameraFeed = new Camera(videoElement, {
            onFrame: async () => { await hands.send({ image: videoElement }); },
            width: 640, height: 480
        });
        cameraFeed.start();

        // --- 4. ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            const positions = geometry.attributes.position.array;

            for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
                // Lerp current position to target position
                positions[i] += (targetPositions[i] - positions[i]) * 0.05;
            }

            // Follow hand movement
            particles.position.x += (handX - particles.position.x) * 0.1;
            particles.position.y += (handY - particles.position.y) * 0.1;

            // Rotation for flair
            particles.rotation.y += 0.005;

            geometry.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        initThree();
        animate();
    </script>
</body>

</html>
