<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Day 15 - Cosmic Realms | Eternal Galaxy Rotation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }

        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.9);
            z-index: 100;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 8px;
            pointer-events: none;
            font-family: 'Courier New', monospace;
            border-left: 3px solid #ff9966;
            letter-spacing: 0.5px;
            animation: subtleGlow 3s ease-in-out infinite;
        }

        @keyframes subtleGlow {

            0%,
            100% {
                border-left-color: #ff9966;
            }

            50% {
                border-left-color: #ffaa77;
            }
        }

        #info h1 {
            margin: 0;
            font-size: 16px;
            color: #ffaa77;
            font-weight: 300;
            letter-spacing: 2px;
        }

        #info p {
            margin: 5px 0 0;
            font-size: 11px;
            opacity: 0.7;
        }

        #controls-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            padding: 8px 15px;
            border-radius: 6px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 11px;
            font-family: monospace;
            pointer-events: none;
            border-right: 2px solid #ff9966;
            text-align: right;
        }

        #counter {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            color: rgba(255, 255, 255, 0.6);
            background: rgba(0, 0, 0, 0.4);
            padding: 4px 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 11px;
            pointer-events: none;
        }

        .instruction {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            font-family: monospace;
            pointer-events: none;
            z-index: 100;
            white-space: nowrap;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 12px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
        }

        .toggle-btn {
            position: absolute;
            bottom: 80px;
            right: 20px;
            z-index: 101;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 153, 102, 0.5);
            color: #ffaa77;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-family: monospace;
            cursor: pointer;
            transition: all 0.3s ease;
            pointer-events: auto;
        }

        .toggle-btn:hover {
            background: rgba(255, 153, 102, 0.2);
            border-color: #ff9966;
            color: #ffbb88;
        }

        @keyframes rotateHint {
            0% {
                transform: translateX(-50%) rotate(0deg);
            }

            100% {
                transform: translateX(-50%) rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div id="info">
        <h1>✦ ETERNAL COSMOS | GALACTIC DANCE ✦</h1>
        <p>NGC-6514 | Auto-Rotating Deep Space Odyssey</p>
    </div>
    <div id="controls-panel">
        <div>🌌 CINEMATIC AUTO-ROTATION</div>
        <div>⭐ 65,535 STAR PARTICLES</div>
        <div>🎨 AUTHENTIC SPECTRAL PALETTE</div>
        <div style="font-size: 9px; margin-top: 4px;">🔄 GALAXY IN MOTION</div>
    </div>
    <div id="counter">
        Stars: <span id="particleCount">0</span> | <span id="fps">0</span> fps | <span id="rotStatus">AUTO</span>
    </div>
    <div class="instruction">
        🖱️ DRAG TO EXPLORE | ✨ AUTO-ROTATING COSMIC VIEW
    </div>
    <button class="toggle-btn" id="toggleRotate">⏸️ PAUSE ROTATION</button>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- Deep Space Scene with Realistic Colors ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x030318);
        scene.fog = new THREE.FogExp2(0x030318, 0.00015);

        // --- Camera with Cinematic Perspective ---
        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1500);
        camera.position.set(28, 12, 32);
        camera.lookAt(0, 0, 0);

        // --- Renderer with Natural Tone Mapping ---
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 0.9;
        document.body.appendChild(renderer.domElement);

        // --- Post Processing with Subtle Bloom ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.6, 0.2, 0.4);
        bloomPass.threshold = 0.3;
        bloomPass.strength = 0.45;
        bloomPass.radius = 0.3;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);

        // --- Controls with Auto-Rotation (ENABLED BY DEFAULT) ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.autoRotate = true;  // Auto-rotation enabled!
        controls.autoRotateSpeed = 0.65;  // Perfect cinematic speed
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.zoomSpeed = 0.8;
        controls.rotateSpeed = 0.6;
        controls.panSpeed = 0.5;
        controls.target.set(0, 0, 0);

        // --- Toggle Auto-Rotation Functionality ---
        let isAutoRotating = true;
        const toggleBtn = document.getElementById('toggleRotate');
        const rotStatusSpan = document.getElementById('rotStatus');

        toggleBtn.addEventListener('click', () => {
            controls.autoRotate = !controls.autoRotate;
            isAutoRotating = controls.autoRotate;

            if (isAutoRotating) {
                toggleBtn.innerHTML = '⏸️ PAUSE ROTATION';
                rotStatusSpan.textContent = 'AUTO';
                rotStatusSpan.style.color = '#ffaa77';
                toggleBtn.style.borderColor = '#ff9966';

                // Add subtle visual feedback
                const instruction = document.querySelector('.instruction');
                instruction.style.opacity = '0.7';
                setTimeout(() => {
                    instruction.style.opacity = '0.4';
                }, 1000);
            } else {
                toggleBtn.innerHTML = '▶️ START ROTATION';
                rotStatusSpan.textContent = 'MANUAL';
                rotStatusSpan.style.color = '#88aacc';
                toggleBtn.style.borderColor = '#88aacc';
            }
        });

        // --- Performance Monitoring ---
        let frameCount = 0;
        let lastTime = performance.now();
        let currentFPS = 60;

        // --- COSMIC PARTICLE SYSTEM: Realistic Galaxy ---
        const PARTICLE_COUNT = 65535;
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const colors = new Float32Array(PARTICLE_COUNT * 3);

        const arms = 4;
        const spiralTightness = 2.4;
        const armSpread = 0.38;
        const radiusMax = 32;
        const radiusMin = 3.5;
        const bulgeRadius = 6;

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const rand = Math.random();
            let radius, angle, yOffset;

            if (rand < 0.7) {
                const armIndex = Math.floor(Math.random() * arms);
                const armAngleOffset = (armIndex / arms) * Math.PI * 2;

                radius = radiusMin + Math.pow(Math.random(), 1.3) * (radiusMax - radiusMin);
                const spiralAngle = spiralTightness * Math.log(radius + 0.5);

                const randomOffset = (Math.random() - 0.5) * armSpread * Math.pow(radius / radiusMax, 0.7);
                angle = armAngleOffset + spiralAngle + randomOffset;

                yOffset = Math.sin(radius * 0.4) * 0.6 * (Math.random() - 0.5);
                yOffset += (Math.random() - 0.5) * 0.4 * Math.exp(-radius / 12);
            } else if (rand < 0.95) {
                radius = Math.pow(Math.random(), 1.4) * bulgeRadius;
                angle = Math.random() * Math.PI * 2;
                yOffset = (Math.random() - 0.5) * 2.2 * (1 - radius / bulgeRadius);
            } else {
                radius = bulgeRadius + Math.pow(Math.random(), 1.8) * (radiusMax - bulgeRadius);
                angle = Math.random() * Math.PI * 2;
                yOffset = (Math.random() - 0.5) * 4.5;
            }

            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            const y = yOffset * 1.2;

            positions[i * 3] = x;
            positions[i * 3 + 1] = y;
            positions[i * 3 + 2] = z;

            const distanceFromCenter = Math.sqrt(x * x + y * y + z * z);
            const normDist = Math.min(1.0, distanceFromCenter / radiusMax);

            let r, g, b;

            if (distanceFromCenter < bulgeRadius) {
                const bulgeFactor = distanceFromCenter / bulgeRadius;
                r = 0.85 + Math.random() * 0.15;
                g = 0.55 + Math.random() * 0.25 - bulgeFactor * 0.2;
                b = 0.35 + Math.random() * 0.2 - bulgeFactor * 0.15;
            } else {
                const armPhase = (angle * arms) % (Math.PI * 2);
                const nebulaeEffect = Math.sin(armPhase * 2) * 0.15;
                const blueIntensity = Math.max(0.3, 1.0 - normDist * 0.7);
                const redIntensity = Math.min(0.8, normDist * 1.2);

                if (Math.random() > 0.7) {
                    r = 0.65 + nebulaeEffect + Math.random() * 0.2;
                    g = 0.45 + nebulaeEffect * 0.5 + Math.random() * 0.2;
                    b = 0.75 + Math.random() * 0.2;
                } else {
                    r = 0.45 + redIntensity * 0.4 + Math.random() * 0.2;
                    g = 0.55 + blueIntensity * 0.3 + Math.random() * 0.2;
                    b = 0.85 + blueIntensity * 0.15 + Math.random() * 0.15;
                }

                const ageVariation = Math.sin(radius * 0.8) * 0.1;
                r += ageVariation;
                g -= ageVariation * 0.5;
            }

            colors[i * 3] = Math.min(0.95, Math.max(0.2, r + (Math.random() - 0.5) * 0.12));
            colors[i * 3 + 1] = Math.min(0.9, Math.max(0.15, g + (Math.random() - 0.5) * 0.1));
            colors[i * 3 + 2] = Math.min(0.95, Math.max(0.2, b + (Math.random() - 0.5) * 0.1));
        }

        const particleGeometry = new THREE.BufferGeometry();
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const vertexShader = `
            attribute vec3 color;
            varying vec3 vColor;
            void main() {
                vColor = color;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                float size = (300.0 / - mvPosition.z) * 0.8;
                gl_PointSize = clamp(size, 1.0, 2.8);
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

        const fragmentShader = `
            varying vec3 vColor;
            uniform sampler2D pointTexture;
            void main() {
                vec2 coord = gl_PointCoord;
                float dist = length(coord - vec2(0.5));
                if (dist > 0.5) discard;
                float alpha = (1.0 - smoothstep(0.2, 0.5, dist)) * 0.7;
                float brightness = 0.8 + (1.0 - dist) * 0.3;
                gl_FragColor = vec4(vColor * brightness, alpha);
            }
        `;

        function createStarTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 32;
            canvas.height = 32;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 32, 32);
            const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.3, 'rgba(255,200,150,0.6)');
            gradient.addColorStop(0.6, 'rgba(100,100,150,0.2)');
            gradient.addColorStop(1, 'rgba(50,50,80,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 32, 32);
            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        }

        const particleMaterial = new THREE.ShaderMaterial({
            uniforms: {
                pointTexture: { value: createStarTexture() }
            },
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const particleSystem = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particleSystem);

        // --- Galactic Core ---
        const coreGeometry = new THREE.SphereGeometry(1.4, 64, 64);
        const coreMaterial = new THREE.MeshStandardMaterial({
            color: 0xcc8866,
            emissive: 0xaa6644,
            emissiveIntensity: 0.6,
            metalness: 0.7,
            roughness: 0.4
        });
        const core = new THREE.Mesh(coreGeometry, coreMaterial);
        scene.add(core);

        const dustRingGeo = new THREE.TorusGeometry(2.2, 0.12, 128, 200);
        const dustRingMat = new THREE.MeshStandardMaterial({
            color: 0xaa8866,
            emissive: 0x664422,
            emissiveIntensity: 0.3,
            transparent: true,
            opacity: 0.6
        });
        const dustRing = new THREE.Mesh(dustRingGeo, dustRingMat);
        scene.add(dustRing);

        const outerDustGeo = new THREE.TorusGeometry(3.4, 0.08, 128, 200);
        const outerDustMat = new THREE.MeshStandardMaterial({
            color: 0x88aacc,
            emissive: 0x446688,
            emissiveIntensity: 0.2,
            transparent: true,
            opacity: 0.5
        });
        const outerDustRing = new THREE.Mesh(outerDustGeo, outerDustMat);
        scene.add(outerDustRing);

        // --- Cosmic Dust Particles ---
        const dustCount = 8000;
        const dustPositions = new Float32Array(dustCount * 3);
        const dustColors = new Float32Array(dustCount * 3);

        for (let i = 0; i < dustCount; i++) {
            const radius = 12 + Math.random() * 20;
            const angle = Math.random() * Math.PI * 2;
            const yOffset = (Math.random() - 0.5) * 6;
            dustPositions[i * 3] = Math.cos(angle) * radius;
            dustPositions[i * 3 + 1] = yOffset;
            dustPositions[i * 3 + 2] = Math.sin(angle) * radius;

            dustColors[i * 3] = 0.35 + Math.random() * 0.25;
            dustColors[i * 3 + 1] = 0.25 + Math.random() * 0.2;
            dustColors[i * 3 + 2] = 0.4 + Math.random() * 0.25;
        }

        const dustGeometry = new THREE.BufferGeometry();
        dustGeometry.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
        dustGeometry.setAttribute('color', new THREE.BufferAttribute(dustColors, 3));
        const dustMaterial = new THREE.PointsMaterial({ size: 0.08, vertexColors: true, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending });
        const dustCloud = new THREE.Points(dustGeometry, dustMaterial);
        scene.add(dustCloud);

        // --- Distant Background Stars ---
        const bgStarsCount = 12000;
        const bgStarsPos = new Float32Array(bgStarsCount * 3);
        for (let i = 0; i < bgStarsCount; i++) {
            bgStarsPos[i * 3] = (Math.random() - 0.5) * 400;
            bgStarsPos[i * 3 + 1] = (Math.random() - 0.5) * 200;
            bgStarsPos[i * 3 + 2] = (Math.random() - 0.5) * 180 - 70;
        }
        const bgStarsGeo = new THREE.BufferGeometry();
        bgStarsGeo.setAttribute('position', new THREE.BufferAttribute(bgStarsPos, 3));
        const bgStarsMat = new THREE.PointsMaterial({ color: 0x88aacc, size: 0.12, transparent: true, opacity: 0.4 });
        const bgStars = new THREE.Points(bgStarsGeo, bgStarsMat);
        scene.add(bgStars);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x111122, 0.4);
        scene.add(ambientLight);

        const coreLight = new THREE.PointLight(0xcc8866, 0.9, 40);
        coreLight.position.set(0, 0, 0);
        scene.add(coreLight);

        const fillLight1 = new THREE.PointLight(0x88aacc, 0.4);
        fillLight1.position.set(8, 4, 6);
        scene.add(fillLight1);

        const fillLight2 = new THREE.PointLight(0xaa8866, 0.3);
        fillLight2.position.set(-7, -3, -5);
        scene.add(fillLight2);

        const backRimLight = new THREE.DirectionalLight(0x88aaff, 0.25);
        backRimLight.position.set(-2, 1, -3);
        scene.add(backRimLight);

        // --- Nebula Clouds ---
        const nebulaCount = 3500;
        const nebulaPositions = new Float32Array(nebulaCount * 3);
        const nebulaColorsArr = new Float32Array(nebulaCount * 3);

        for (let i = 0; i < nebulaCount; i++) {
            const radius = 14 + Math.random() * 18;
            const angle = Math.random() * Math.PI * 2;
            const yOffset = (Math.random() - 0.5) * 5;
            nebulaPositions[i * 3] = Math.cos(angle) * radius;
            nebulaPositions[i * 3 + 1] = yOffset + Math.sin(angle * 3) * 1.2;
            nebulaPositions[i * 3 + 2] = Math.sin(angle) * radius;

            const type = Math.random();
            if (type < 0.33) {
                nebulaColorsArr[i * 3] = 0.55 + Math.random() * 0.25;
                nebulaColorsArr[i * 3 + 1] = 0.35 + Math.random() * 0.2;
                nebulaColorsArr[i * 3 + 2] = 0.65 + Math.random() * 0.25;
            } else if (type < 0.66) {
                nebulaColorsArr[i * 3] = 0.65 + Math.random() * 0.2;
                nebulaColorsArr[i * 3 + 1] = 0.45 + Math.random() * 0.2;
                nebulaColorsArr[i * 3 + 2] = 0.55 + Math.random() * 0.2;
            } else {
                nebulaColorsArr[i * 3] = 0.45 + Math.random() * 0.2;
                nebulaColorsArr[i * 3 + 1] = 0.45 + Math.random() * 0.2;
                nebulaColorsArr[i * 3 + 2] = 0.75 + Math.random() * 0.2;
            }
        }

        const nebulaGeometry = new THREE.BufferGeometry();
        nebulaGeometry.setAttribute('position', new THREE.BufferAttribute(nebulaPositions, 3));
        nebulaGeometry.setAttribute('color', new THREE.BufferAttribute(nebulaColorsArr, 3));
        const nebulaMaterial = new THREE.PointsMaterial({ size: 0.15, vertexColors: true, transparent: true, opacity: 0.25, blending: THREE.AdditiveBlending });
        const nebulae = new THREE.Points(nebulaGeometry, nebulaMaterial);
        scene.add(nebulae);

        // --- Animation Variables ---
        let time = 0;

        function updateFPS() {
            frameCount++;
            const now = performance.now();
            const delta = now - lastTime;
            if (delta >= 1000) {
                currentFPS = frameCount;
                document.getElementById('fps').textContent = currentFPS;
                document.getElementById('particleCount').textContent = PARTICLE_COUNT.toLocaleString();
                frameCount = 0;
                lastTime = now;
            }
        }

        // --- Gentle Cosmic Animation ---
        function animate() {
            requestAnimationFrame(animate);

            time += 0.003;

            // Subtle core pulsation
            const pulse = 1 + Math.sin(time * 2.5) * 0.03;
            core.scale.set(pulse, pulse, pulse);
            coreLight.intensity = 0.85 + Math.sin(time * 2.2) * 0.15;

            // Rings rotation
            dustRing.rotation.x = Math.sin(time * 0.5) * 0.1;
            dustRing.rotation.z = time * 0.15;
            outerDustRing.rotation.x = Math.cos(time * 0.4) * 0.08;
            outerDustRing.rotation.y = time * 0.1;

            // Slow rotation of dust and nebulae
            dustCloud.rotation.y += 0.0008;
            nebulae.rotation.y -= 0.0005;
            bgStars.rotation.y += 0.0002;

            // Gentle particle system rotation (internal galaxy rotation)
            particleSystem.rotation.y = time * 0.03;
            particleSystem.rotation.x = Math.sin(time * 0.1) * 0.02;

            // Update controls (auto-rotate handled by OrbitControls)
            controls.update();

            // Subtle color shift for nebulae
            const colorsAttr = nebulaGeometry.attributes.color.array;
            for (let i = 0; i < nebulaCount; i += 50) {
                const shift = Math.sin(time * 0.2 + i) * 0.02;
                colorsAttr[i * 3] = Math.min(0.85, Math.max(0.35, colorsAttr[i * 3] + shift));
                colorsAttr[i * 3 + 2] = Math.min(0.85, Math.max(0.45, colorsAttr[i * 3 + 2] + shift * 0.5));
            }
            nebulaGeometry.attributes.color.needsUpdate = Math.random() < 0.05;

            updateFPS();
            effectComposer.render();
        }

        animate();

        // --- Handle Window Resize ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effectComposer.setSize(window.innerWidth, window.innerHeight);
        }

        // Console message
        console.log("%c🌌 ETERNAL COSMOS | AUTO-ROTATING GALACTIC RENDER", "color: #ffaa77; font-size: 14px; font-weight: bold;");
        console.log("%c✨ Auto-rotation enabled | Drag to explore | Click button to pause", "color: #88aacc; font-size: 11px;");

        // Mobile hint with rotation animation
        if (/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
            const hint = document.createElement('div');
            hint.style.position = 'absolute';
            hint.style.bottom = '70px';
            hint.style.left = '50%';
            hint.style.transform = 'translateX(-50%)';
            hint.style.color = 'rgba(255,255,255,0.5)';
            hint.style.background = 'rgba(0,0,0,0.5)';
            hint.style.padding = '4px 12px';
            hint.style.borderRadius = '20px';
            hint.style.fontSize = '10px';
            hint.style.fontFamily = 'monospace';
            hint.style.pointerEvents = 'none';
            hint.style.zIndex = '100';
            hint.innerHTML = '🔄 AUTO-ROTATING | 👆 TOUCH TO EXPLORE';
            document.body.appendChild(hint);
        }

        // Add subtle instruction for desktop users
        const style = document.createElement('style');
        style.textContent = `
            .toggle-btn {
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .toggle-btn:active {
                transform: scale(0.95);
            }
        `;
        document.head.appendChild(style);
    </script>
</body>

</html>
